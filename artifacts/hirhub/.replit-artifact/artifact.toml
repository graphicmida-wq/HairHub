kind = "web"
previewPath = "/"
title = "HairHub"
version = "1.0.0"
id = "artifacts/hirhub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25779

[services.development]
run = "pnpm --filter @workspace/hirhub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hirhub", "run", "build" ]
publicDir = "artifacts/hirhub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25779"
BASE_PATH = "/"
