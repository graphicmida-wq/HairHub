openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: HirHub salon management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management
  - name: services
    description: Service management
  - name: products
    description: Product/inventory management
  - name: appointments
    description: Appointment management
  - name: settings
    description: Salon settings
  - name: staff
    description: Staff/team management
  - name: client-formulas
    description: Client formula management
  - name: auth
    description: Authentication
  - name: users
    description: User account management (admin only)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientInput"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientInput"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client and their appointments
      responses:
        "204":
          description: Deleted

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a new service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceInput"
      responses:
        "201":
          description: Created service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getService
      tags: [services]
      summary: Get a service by ID
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateService
      tags: [services]
      summary: Update a service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceInput"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      responses:
        "204":
          description: Deleted

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List all appointments
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create a new appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentInput"
      responses:
        "201":
          description: Created appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get an appointment by ID
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentInput"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete an appointment
      responses:
        "204":
          description: Deleted

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      responses:
        "200":
          description: List of staff members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaffMember
      tags: [staff]
      summary: Create a new staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffMemberInput"
      responses:
        "201":
          description: Created staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: updateStaffMember
      tags: [staff]
      summary: Update a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffMemberInput"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteStaffMember
      tags: [staff]
      summary: Delete a staff member
      responses:
        "204":
          description: Deleted

  /client-formulas:
    get:
      operationId: listClientFormulas
      tags: [client-formulas]
      summary: List client formulas
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of client formulas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientFormula"
    post:
      operationId: createClientFormula
      tags: [client-formulas]
      summary: Create a new client formula
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientFormulaInput"
      responses:
        "201":
          description: Created client formula
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientFormula"

  /client-formulas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getClientFormula
      tags: [client-formulas]
      summary: Get a client formula by ID
      responses:
        "200":
          description: Client formula
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientFormula"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: updateClientFormula
      tags: [client-formulas]
      summary: Update a client formula
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientFormulaInput"
      responses:
        "200":
          description: Updated client formula
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientFormula"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteClientFormula
      tags: [client-formulas]
      summary: Delete a client formula
      responses:
        "204":
          description: Deleted

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get salon settings
      responses:
        "200":
          description: Salon settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalonSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update salon settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalonSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalonSettings"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current user
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AuthUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        name:
          type: string
          nullable: true
      required:
        - id
        - username
        - role

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    CreateUserInput:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [admin, user]
        name:
          type: string
          nullable: true
      required:
        - username
        - password
        - role

    UpdateUserInput:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [admin, user]
        name:
          type: string
          nullable: true

    Client:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        email:
          type: string
        dob:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        allergies:
          type: string
          nullable: true
        hairSpecs:
          type: string
          nullable: true
      required:
        - id
        - firstName
        - lastName
        - phone
        - email

    CreateClientInput:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        email:
          type: string
        dob:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        allergies:
          type: string
          nullable: true
        hairSpecs:
          type: string
          nullable: true
      required:
        - firstName
        - lastName
        - phone
        - email

    UpdateClientInput:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        email:
          type: string
        dob:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        allergies:
          type: string
          nullable: true
        hairSpecs:
          type: string
          nullable: true

    Service:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        color:
          type: string
        durationMins:
          type: integer
        price:
          type: number
        notes:
          type: string
          nullable: true
      required:
        - id
        - name
        - category
        - color
        - durationMins
        - price

    CreateServiceInput:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        color:
          type: string
        durationMins:
          type: integer
        price:
          type: number
        notes:
          type: string
          nullable: true
      required:
        - name
        - category
        - color
        - durationMins
        - price

    UpdateServiceInput:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        color:
          type: string
        durationMins:
          type: integer
        price:
          type: number
        notes:
          type: string
          nullable: true

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        brand:
          type: string
        price:
          type: number
          minimum: 0
        quantity:
          type: integer
          description: Number of physical units (bottles/packages)
        minThreshold:
          type: integer
        supplier:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        unitSize:
          type: number
          nullable: true
          description: Size in g or ml per unit/package
        unitType:
          type: string
          enum: [g, ml]
          nullable: true
          description: Unit of measurement for weight/volume tracking
        stockGrams:
          type: number
          nullable: true
          description: Total remaining stock in g or ml (quantity * unitSize, decremented on use)
      required:
        - id
        - name
        - category
        - brand
        - price
        - quantity
        - minThreshold

    CreateProductInput:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        brand:
          type: string
        price:
          type: number
          minimum: 0
        quantity:
          type: integer
          description: Number of physical units (bottles/packages)
        minThreshold:
          type: integer
        supplier:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        unitSize:
          type: number
          nullable: true
          description: Size in g or ml per unit/package
        unitType:
          type: string
          enum: [g, ml]
          nullable: true
        stockGrams:
          type: number
          nullable: true
          description: Total stock in g or ml (auto-computed as quantity * unitSize if not provided)
      required:
        - name
        - category
        - brand
        - price
        - quantity
        - minThreshold

    UpdateProductInput:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        brand:
          type: string
        price:
          type: number
          minimum: 0
        quantity:
          type: integer
        minThreshold:
          type: integer
        supplier:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        unitSize:
          type: number
          nullable: true
        unitType:
          type: string
          enum: [g, ml]
          nullable: true
        stockGrams:
          type: number
          nullable: true

    AppointmentStatus:
      type: string
      enum:
        - prenotato
        - completato
        - annullato
        - no-show

    StaffMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          nullable: true
        color:
          type: string
          description: "Hex color string, e.g. #e05c5c"
      required:
        - id
        - name
        - color

    CreateStaffMemberInput:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          nullable: true
        color:
          type: string
      required:
        - name
        - color

    UpdateStaffMemberInput:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          nullable: true
        color:
          type: string

    UsedProductEntry:
      type: object
      properties:
        productId:
          type: string
        quantityUsed:
          type: number
          minimum: 0
          description: Amount used in g or ml
      required:
        - productId
        - quantityUsed

    SoldProductEntry:
      type: object
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          minimum: 0
      required:
        - productId
        - quantity
        - unitPrice

    Appointment:
      type: object
      properties:
        id:
          type: string
        clientId:
          type: string
        serviceIds:
          type: array
          items:
            type: string
          minItems: 1
        servicePrices:
          type: array
          items:
            type: number
            minimum: 0
          nullable: true
        serviceListPrices:
          type: array
          items:
            type: number
            minimum: 0
          nullable: true
        staffId:
          type: string
          nullable: true
        date:
          type: string
          description: "YYYY-MM-DD"
        time:
          type: string
          description: "HH:MM"
        durationMins:
          type: integer
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        notes:
          type: string
          nullable: true
        usedProductIds:
          type: array
          items:
            type: string
          nullable: true
          description: "Deprecated: use usedProducts instead"
        usedProducts:
          type: array
          items:
            $ref: "#/components/schemas/UsedProductEntry"
          nullable: true
        soldProducts:
          type: array
          items:
            $ref: "#/components/schemas/SoldProductEntry"
          nullable: true
      required:
        - id
        - clientId
        - serviceIds
        - date
        - time
        - durationMins
        - status

    CreateAppointmentInput:
      type: object
      properties:
        clientId:
          type: string
        serviceIds:
          type: array
          items:
            type: string
          minItems: 1
        servicePrices:
          type: array
